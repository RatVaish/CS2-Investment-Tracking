version: '3.8'

services:
  # PostgreSQL Database
  db:
    image: postgres:15-alpine
    container_name: cs2_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pgdbadmin}
      POSTGRES_DB: cs_investments
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    networks:
      - cs2_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # FastAPI Backend
  backend:
    build: ./backend
    container_name: cs2_backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD:-pgdbadmin}@db:5432/cs_investments
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      JWT_ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 30
      REFRESH_TOKEN_EXPIRE_DAYS: 7
      PROJECT_NAME: CS2 Investment Tracker
      VERSION: 2.0.0
      DEBUG: ${DEBUG:-False}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS}
      CSFLOAT_API_KEY: ${CSFLOAT_API_KEY}
      FRONTEND_URL: ${FRONTEND_URL}
      STEAM_RETURN_URL: ${STEAM_RETURN_URL}
      STEAM_API_KEY: ${STEAM_API_KEY}
    volumes:
      - ./backend/public:/app/public
    ports:
      - "8000:8000"
    networks:
      - cs2_network
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # React Frontend with Nginx
  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: http://100.95.133.40:8000/api/v1
    container_name: cs2_frontend
    restart: unless-stopped
    ports:
      - "80:80"
    networks:
      - cs2_network
    depends_on:
      - backend
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  cs2_network:
    driver: bridge

volumes:
  postgres_data:
